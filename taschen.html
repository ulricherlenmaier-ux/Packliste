<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taschen</title>
<style>
  :root {
    --bg: #F2F0EB; --surface: #FFF; --border: #D8D4CC;
    --text: #1A1814; --text2: #6B6560; --accent: #3D6B4F; --accent-light: #EAF2ED;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 10px 16px 40px; }
  h1 { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
  .sub { font-size: 12px; color: var(--text2); margin-bottom: 10px; text-align: center; }

  .toolbar { display: flex; gap: 8px; width: 100%; max-width: 380px; margin-bottom: 12px; }
  .btn { border: none; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--font); transition: opacity 0.15s; flex: 1; }
  .btn:active { opacity: 0.7; }
  .btn-ghost { background: #E8E4DC; color: var(--text2); }
  .btn-edit { background: var(--accent-light); color: var(--accent); flex: 1; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-danger { background: #FDECEA; color: #C0392B; }

  .wrap { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 16px; }

  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text2); }

  .bag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .bag-card { border-radius: 14px; padding: 12px; cursor: pointer; border: 2px solid transparent;
    display: flex; flex-direction: column; gap: 4px; min-height: 84px; justify-content: flex-end;
    position: relative; }
  .bag-card.active { border-color: var(--text); }
  .bag-icon { font-size: 22px; }
  .bag-name { font-size: 13px; font-weight: 700; color: #fff; }
  .bag-sub { font-size: 11px; color: rgba(255,255,255,0.85); }
  .bag-count { position: absolute; top: 8px; right: 10px; font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 600; }

  .info-panel { background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); min-height: 70px; }
  .info-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .info-sub { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .info-items { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .info-items li { font-size: 13px; color: var(--text); line-height: 1.35; padding-left: 18px; position: relative; }
  .info-items li::before { content: '·'; position: absolute; left: 6px; color: var(--accent); font-weight: 700; }
  .info-hint { font-size: 12px; color: #BBB; text-align: center; padding: 8px 0; }
  .info-actions { display: flex; gap: 8px; margin-top: 12px; }

  .edit-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .edit-row input { flex: 1; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: var(--font); background: var(--surface); color: var(--text); }
  .edit-row input:focus { outline: none; border-color: var(--accent); }
  .edit-del { background: #FDECEA; color: #C0392B; border: none; border-radius: 7px; width: 32px; height: 32px;
    font-size: 16px; cursor: pointer; flex-shrink: 0; }
  .edit-add { background: var(--accent-light); color: var(--accent); border: 1px dashed var(--accent);
    border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%;
    margin-top: 4px; font-family: var(--font); }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 500; max-width: 80%; text-align: center; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>🎒 Taschen</h1>
<p class="sub">Wo verstaue ich was? · Tap auf eine Tasche für Details</p>

<div class="toolbar">
  <button class="btn btn-ghost" onclick="exportJSON()">⬇ Export</button>
  <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">⬆ Import</button>
  <button class="btn btn-ghost" onclick="resetTaschen()">↺ Reset</button>
  <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importJSON(event)">
</div>

<div class="wrap">
  <div>
    <div class="section-label" style="margin-bottom:8px;">Taschen</div>
    <div class="bag-grid" id="bag-grid"></div>
  </div>

  <div>
    <div class="section-label" style="margin-bottom:8px;">Auto (lose verstaut)</div>
    <div class="bag-grid" id="auto-grid" style="grid-template-columns:1fr;"></div>
  </div>

  <div class="info-panel" id="info-panel">
    <span class="info-hint">Tap auf eine Tasche für Details</span>
  </div>
</div>

<script>
const DEFAULT_TASCHEN = {
  t1: { name: 'Tasche 1 · T1', sub: 'Kleidung', brand: 'North Face', color: '#2C4B7C', icon: '🧥', items: [] },
  t2: { name: 'Tasche 2 · T2', sub: 'Sport', brand: 'Ikea · hellblau', color: '#7EC8E3', icon: '🏃', items: ['ggf. inkl. Handtücher'] },
  t3: { name: 'Tasche 3 · T3', sub: 'Schuhe', brand: 'Ikea · dunkelblau', color: '#1B3A6B', icon: '👟', items: [] },
  t9: { name: 'Tasche 9 · T9', sub: 'Rucksack', brand: 'Erste Übernachtung', color: '#8B5E3C', icon: '🎒', items: [] },
};

const DEFAULT_AUTO = {
  auto: { name: 'Auto', sub: 'Lose verstaute Gegenstände', brand: '', color: '#6B6560', icon: '🚗', items: [
    'Graue Zieharmonika-Tasche',
    '2 Boxen für Lebensmittel',
    'Kühlschrank',
    'Packsäcke in den Stauraum',
    'Trinkwasser voll machen',
  ]},
};

let TASCHEN = {};
let currentBag = null;
let editMode = false;

function loadTaschen() {
  try {
    const saved = localStorage.getItem('taschen_v1');
    const merged = JSON.parse(JSON.stringify({ ...DEFAULT_TASCHEN, ...DEFAULT_AUTO }));
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.keys(merged).forEach(key => {
        if (parsed[key]) merged[key] = { ...merged[key], ...parsed[key] };
      });
    }
    TASCHEN = merged;
  } catch (e) {
    TASCHEN = JSON.parse(JSON.stringify({ ...DEFAULT_TASCHEN, ...DEFAULT_AUTO }));
  }
}

function saveTaschen() {
  localStorage.setItem('taschen_v1', JSON.stringify(TASCHEN));
}

function renderGrids() {
  const bagKeys = Object.keys(DEFAULT_TASCHEN);
  document.getElementById('bag-grid').innerHTML = bagKeys.map(key => renderCard(key)).join('');

  const autoKeys = Object.keys(DEFAULT_AUTO);
  document.getElementById('auto-grid').innerHTML = autoKeys.map(key => renderCard(key)).join('');
}

function renderCard(key) {
  const bag = TASCHEN[key];
  const count = (bag.items || []).length;
  return `<div class="bag-card ${currentBag === key ? 'active' : ''}" style="background:${bag.color}" onclick="showBag('${key}')">
    <div class="bag-count">${count}</div>
    <div class="bag-icon">${bag.icon}</div>
    <div class="bag-name">${bag.name}</div>
    <div class="bag-sub">${bag.sub}${bag.brand ? ' · ' + bag.brand : ''}</div>
  </div>`;
}

function showBag(key) {
  currentBag = key;
  editMode = false;
  renderGrids();
  renderPanel();
}

function renderPanel() {
  const panel = document.getElementById('info-panel');
  if (!currentBag) {
    panel.innerHTML = `<span class="info-hint">Tap auf eine Tasche für Details</span>`;
    return;
  }
  const bag = TASCHEN[currentBag];

  if (editMode) {
    let html = `<div class="info-name">${bag.icon} ${bag.name}</div><div class="info-sub">${bag.sub}${bag.brand ? ' · ' + bag.brand : ''}</div>`;
    (bag.items || []).forEach((item, i) => {
      html += `<div class="edit-row">
        <input value="${escapeAttr(item)}" oninput="updateItem(${i}, this.value)">
        <button class="edit-del" onclick="removeItem(${i})">✕</button>
      </div>`;
    });
    html += `<div class="edit-add" onclick="addItem()">+ Item hinzufügen</div>`;
    html += `<div class="info-actions">
      <button class="btn btn-accent" onclick="doneEdit()">✓ Fertig</button>
    </div>`;
    panel.innerHTML = html;
    return;
  }

  let html = `<div class="info-name">${bag.icon} ${bag.name}</div><div class="info-sub">${bag.sub}${bag.brand ? ' · ' + bag.brand : ''}</div>`;
  if (bag.items && bag.items.length) {
    html += `<ul class="info-items">` + bag.items.map(i => `<li>${escapeHtml(i)}</li>`).join('') + `</ul>`;
  } else {
    html += `<div class="info-sub">Noch keine Items eingetragen.</div>`;
  }
  html += `<div class="info-actions">
    <button class="btn btn-edit" onclick="startEdit()">✏️ Bearbeiten</button>
  </div>`;
  panel.innerHTML = html;
}

function startEdit() { editMode = true; renderPanel(); }
function doneEdit() {
  const bag = TASCHEN[currentBag];
  if (bag.items) bag.items = bag.items.filter(x => x.trim() !== '');
  saveTaschen();
  editMode = false;
  renderPanel();
  renderGrids();
  toast('Gespeichert');
}

function updateItem(i, val) { TASCHEN[currentBag].items[i] = val; }
function removeItem(i) { TASCHEN[currentBag].items.splice(i, 1); renderPanel(); }
function addItem() { TASCHEN[currentBag].items.push(''); renderPanel(); }

function resetTaschen() {
  TASCHEN = JSON.parse(JSON.stringify({ ...DEFAULT_TASCHEN, ...DEFAULT_AUTO }));
  saveTaschen();
  renderGrids();
  renderPanel();
  toast('Zurückgesetzt');
}

async function exportJSON() {
  const data = JSON.stringify(TASCHEN, null, 2);
  const filename = 'taschen-export.json';
  try {
    const file = new File([data], filename, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Taschen Export' });
      toast('Geteilt');
      return;
    }
  } catch (err) {
    if (err && err.name === 'AbortError') return;
  }
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('JSON exportiert');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      TASCHEN = { ...TASCHEN, ...parsed };
      saveTaschen();
      renderGrids();
      renderPanel();
      toast('JSON importiert');
    } catch (err) {
      toast('Fehler beim Import');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }

let toastTimer;
function toast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// Init
loadTaschen();
renderGrids();
</script>

</body>
</html>
