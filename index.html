<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camper">
<title>Camper</title>
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E2DED6;
    --text: #1A1814;
    --text2: #6B6560;
    --accent: #3D6B4F;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .switcher {
    display: flex;
    gap: 8px;
    padding: calc(var(--safe-top) + 8px) 12px 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .switch-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .switch-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .switch-btn:active { opacity: 0.8; }

  .frames {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .frames iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
    display: none;
  }
  .frames iframe.active { display: block; }
</style>
</head>
<body>

<div class="switcher">
  <button class="switch-btn" id="btn-packliste" onclick="switchApp('packliste')">📦 Packliste</button>
  <button class="switch-btn" id="btn-camper" onclick="switchApp('camper')">🚐 Camper</button>
  <button class="switch-btn" id="btn-taschen" onclick="switchApp('taschen')">🎒 Taschen</button>
</div>

<div class="frames">
  <iframe id="frame-packliste" src="packliste.html" title="Packliste"></iframe>
  <iframe id="frame-camper" src="vanderer-grundriss.html" title="Camper"></iframe>
  <iframe id="frame-taschen" src="taschen.html" title="Taschen"></iframe>
</div>

<script>
  const APPS = ['packliste', 'camper', 'taschen'];
  function switchApp(name) {
    APPS.forEach(a => {
      document.getElementById('frame-' + a).classList.toggle('active', a === name);
      document.getElementById('btn-' + a).classList.toggle('active', a === name);
    });
    localStorage.setItem('shell_last_app', name);
  }

  // Beim Öffnen: zuletzt genutzte App wieder anzeigen (Standard: Packliste)
  switchApp(localStorage.getItem('shell_last_app') || 'packliste');
</script>

</body>
</html>
